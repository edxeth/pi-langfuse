name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Biome Check
      run: npm run check

    - name: Type Check
      run: npm run typecheck

    - name: Run Tests
      env:
        RUN_LANGFUSE_E2E: "1"
        LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
        LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
        LANGFUSE_BASE_URL: ${{ secrets.LANGFUSE_BASE_URL }}
        LANGFUSE_HOST: ${{ secrets.LANGFUSE_BASE_URL }}
      run: npm run test

    - name: Build
      run: npm run build
